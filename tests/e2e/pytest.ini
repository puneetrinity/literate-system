[pytest]
# E2E Test Configuration
asyncio_mode = auto
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test execution options
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --strict-config
    --disable-warnings
    --durations=10
    --maxfail=3

# Custom markers for E2E tests
markers =
    e2e: End-to-end integration tests
    performance: Performance and load testing
    data_flow: Data flow and consistency tests
    api_workflow: API workflow testing
    deployment: Deployment validation tests
    health: Health check tests
    integration: Cross-service integration tests
    slow: Tests that take more than 30 seconds
    requires_docker: Tests that require Docker environment
    requires_services: Tests that require running services
    critical: Critical tests that must pass
    
# Timeout settings
timeout = 300
timeout_method = thread

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(filename)s:%(lineno)d: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Minimum version requirements
minversion = 7.0

# Test discovery
collect_ignore = [
    "setup.py",
    "conftest.py"
]

# Filterwarnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:docker.*
    ignore::UserWarning:urllib3.*