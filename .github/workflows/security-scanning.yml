name: Security Vulnerability Scanning

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    # Run security scans daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of security scan'
        required: true
        default: 'comprehensive'
        type: choice
        options:
          - comprehensive
          - dependency-only
          - code-only
          - container-only

env:
  PYTHON_VERSION: '3.10'

jobs:
  # ================================
  # Dependency Vulnerability Scanning
  # ================================
  dependency-security-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    strategy:
      matrix:
        service: [ai-chat-service, document-search-service]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install security scanning tools
      run: |
        python -m pip install --upgrade pip
        pip install safety pip-audit bandit semgrep
        
    - name: Scan dependencies with Safety
      working-directory: ./${{ matrix.service }}
      run: |
        echo "🛡️ Running Safety scan for ${{ matrix.service }}..."
        safety check \
          --json \
          --output safety-report.json \
          --continue-on-error || true
          
        # Convert to human-readable format
        safety check \
          --output safety-report.txt \
          --continue-on-error || true
          
    - name: Scan dependencies with pip-audit
      working-directory: ./${{ matrix.service }}
      run: |
        echo "🔍 Running pip-audit scan for ${{ matrix.service }}..."
        pip-audit \
          --format=json \
          --output=pip-audit-report.json \
          --require requirements.txt \
          --continue-on-vuln || true
          
        # Generate summary report
        pip-audit \
          --format=cyclonedx-json \
          --output=sbom.json \
          --require requirements.txt \
          --continue-on-vuln || true
          
    - name: Upload dependency scan results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: dependency-security-${{ matrix.service }}
        path: |
          ${{ matrix.service }}/safety-report.*
          ${{ matrix.service }}/pip-audit-report.json
          ${{ matrix.service }}/sbom.json

  # ================================
  # Static Code Security Analysis
  # ================================
  static-code-analysis:
    name: Static Code Security Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    strategy:
      matrix:
        service: [ai-chat-service, document-search-service]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install static analysis tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit semgrep dlint
        
    - name: Run Bandit security linter
      working-directory: ./${{ matrix.service }}
      run: |
        echo "🔒 Running Bandit security scan for ${{ matrix.service }}..."
        bandit -r app/ \
          -f json \
          -o bandit-report.json \
          --exit-zero
          
        # Generate human-readable report
        bandit -r app/ \
          -f txt \
          -o bandit-report.txt \
          --exit-zero
          
        # Generate SARIF format for GitHub Security tab
        bandit -r app/ \
          -f sarif \
          -o bandit-sarif.json \
          --exit-zero
          
    - name: Run Semgrep security analysis
      working-directory: ./${{ matrix.service }}
      run: |
        echo "🔍 Running Semgrep security analysis for ${{ matrix.service }}..."
        semgrep \
          --config=auto \
          --json \
          --output=semgrep-report.json \
          app/ || true
          
        # Generate SARIF format
        semgrep \
          --config=auto \
          --sarif \
          --output=semgrep-sarif.json \
          app/ || true
          
    - name: Run additional Python security checks
      working-directory: ./${{ matrix.service }}
      run: |
        echo "🐍 Running additional Python security checks..."
        
        # Check for hardcoded secrets patterns
        grep -r -n -i \
          -E "(password|secret|key|token|api_key)\s*=\s*['\"][^'\"]{8,}" \
          app/ > hardcoded-secrets.txt || echo "No hardcoded secrets found"
          
        # Check for SQL injection patterns
        grep -r -n -i \
          -E "(SELECT|INSERT|UPDATE|DELETE).*%s|\.format\(" \
          app/ > sql-injection-patterns.txt || echo "No SQL injection patterns found"
          
        # Check for command injection patterns
        grep -r -n -i \
          -E "(os\.system|subprocess\.call|subprocess\.run).*input|request" \
          app/ > command-injection-patterns.txt || echo "No command injection patterns found"
          
    - name: Upload static analysis results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: static-analysis-${{ matrix.service }}
        path: |
          ${{ matrix.service }}/bandit-report.*
          ${{ matrix.service }}/semgrep-report.*
          ${{ matrix.service }}/*-sarif.json
          ${{ matrix.service }}/*-patterns.txt
          
    - name: Upload SARIF results to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: ${{ matrix.service }}/bandit-sarif.json
        category: bandit-${{ matrix.service }}
        
    - name: Upload Semgrep SARIF to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      if: always() && hashFiles(format('{0}/semgrep-sarif.json', matrix.service)) != ''
      with:
        sarif_file: ${{ matrix.service }}/semgrep-sarif.json
        category: semgrep-${{ matrix.service }}

  # ================================
  # Container Security Scanning
  # ================================
  container-security-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      matrix:
        service: [ai-chat-service, document-search-service]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image for scanning
      uses: docker/build-push-action@v5
      with:
        context: ./${{ matrix.service }}
        file: ./${{ matrix.service }}/Dockerfile
        push: false
        tags: security-scan-${{ matrix.service }}:latest
        load: true
        
    - name: Run Trivy container vulnerability scan
      run: |
        echo "🔍 Running Trivy container scan for ${{ matrix.service }}..."
        
        # Install Trivy
        sudo apt-get update
        sudo apt-get install wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy
        
        mkdir -p security-reports
        
        # Scan for vulnerabilities
        trivy image \
          --format json \
          --output security-reports/trivy-${{ matrix.service }}.json \
          --severity HIGH,CRITICAL \
          --exit-code 0 \
          security-scan-${{ matrix.service }}:latest
          
        # Generate SARIF format
        trivy image \
          --format sarif \
          --output security-reports/trivy-${{ matrix.service }}-sarif.json \
          --severity HIGH,CRITICAL \
          --exit-code 0 \
          security-scan-${{ matrix.service }}:latest
          
        # Generate table format for human reading
        trivy image \
          --format table \
          --output security-reports/trivy-${{ matrix.service }}-table.txt \
          --severity HIGH,CRITICAL \
          --exit-code 0 \
          security-scan-${{ matrix.service }}:latest
          
    - name: Run Docker Scout vulnerability scan
      run: |
        echo "🛡️ Running Docker Scout scan for ${{ matrix.service }}..."
        
        # Install Docker Scout
        curl -sSfL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh -s --
        
        # Run Scout scan
        docker scout cves \
          --format sarif \
          --output security-reports/scout-${{ matrix.service }}-sarif.json \
          security-scan-${{ matrix.service }}:latest || true
          
        # Generate summary
        docker scout cves \
          --format table \
          --output security-reports/scout-${{ matrix.service }}-summary.txt \
          security-scan-${{ matrix.service }}:latest || true
          
    - name: Run container configuration security check
      run: |
        echo "⚙️ Running container configuration security check..."
        
        # Check Dockerfile security best practices
        cat > check-dockerfile.sh << 'EOF'
        #!/bin/bash
        DOCKERFILE_PATH=$1
        SERVICE_NAME=$2
        OUTPUT_FILE="security-reports/dockerfile-security-${SERVICE_NAME}.txt"
        
        echo "Dockerfile Security Check for ${SERVICE_NAME}" > $OUTPUT_FILE
        echo "=============================================" >> $OUTPUT_FILE
        echo "" >> $OUTPUT_FILE
        
        # Check for non-root user
        if grep -q "USER " $DOCKERFILE_PATH; then
          echo "✅ Non-root user specified" >> $OUTPUT_FILE
        else
          echo "⚠️  WARNING: No non-root user specified" >> $OUTPUT_FILE
        fi
        
        # Check for secrets in Dockerfile
        if grep -i -E "(password|secret|key|token)" $DOCKERFILE_PATH; then
          echo "❌ CRITICAL: Potential secrets found in Dockerfile" >> $OUTPUT_FILE
        else
          echo "✅ No obvious secrets in Dockerfile" >> $OUTPUT_FILE
        fi
        
        # Check for package manager cache cleanup
        if grep -q "rm -rf /var/lib/apt/lists" $DOCKERFILE_PATH; then
          echo "✅ Package manager cache cleaned" >> $OUTPUT_FILE
        else
          echo "⚠️  WARNING: Package manager cache not cleaned" >> $OUTPUT_FILE
        fi
        
        # Check for HEALTHCHECK
        if grep -q "HEALTHCHECK" $DOCKERFILE_PATH; then
          echo "✅ Health check configured" >> $OUTPUT_FILE
        else
          echo "⚠️  WARNING: No health check configured" >> $OUTPUT_FILE
        fi
        
        # Check for specific port exposure
        if grep -q "EXPOSE" $DOCKERFILE_PATH; then
          echo "✅ Specific ports exposed" >> $OUTPUT_FILE
        else
          echo "⚠️  WARNING: No specific ports exposed" >> $OUTPUT_FILE
        fi
        EOF
        
        chmod +x check-dockerfile.sh
        ./check-dockerfile.sh ${{ matrix.service }}/Dockerfile ${{ matrix.service }}
        
    - name: Upload container security results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: container-security-${{ matrix.service }}
        path: security-reports/
        
    - name: Upload Trivy SARIF to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      if: always() && hashFiles('security-reports/trivy-*-sarif.json') != ''
      with:
        sarif_file: security-reports/trivy-${{ matrix.service }}-sarif.json
        category: trivy-${{ matrix.service }}

  # ================================
  # Infrastructure Security Scan
  # ================================
  infrastructure-security-scan:
    name: Infrastructure Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install infrastructure security tools
      run: |
        # Install checkov for infrastructure as code scanning
        pip install checkov
        
        # Install kube-score for Kubernetes security
        wget -O kube-score https://github.com/zegl/kube-score/releases/latest/download/kube-score_linux_amd64
        chmod +x kube-score
        sudo mv kube-score /usr/local/bin/
        
    - name: Scan Docker Compose files
      run: |
        echo "🔍 Scanning Docker Compose files..."
        mkdir -p infrastructure-security
        
        # Scan docker-compose files with checkov
        checkov \
          --framework docker \
          --output json \
          --output-file infrastructure-security/docker-compose-security.json \
          --file docker-compose.yml || true
          
        # Check for security issues in compose files
        cat > check-compose-security.sh << 'EOF'
        #!/bin/bash
        OUTPUT_FILE="infrastructure-security/docker-compose-analysis.txt"
        
        echo "Docker Compose Security Analysis" > $OUTPUT_FILE
        echo "=================================" >> $OUTPUT_FILE
        echo "" >> $OUTPUT_FILE
        
        # Check for secrets in environment variables
        if grep -r -E "PASSWORD|SECRET|KEY|TOKEN" *.yml; then
          echo "⚠️  WARNING: Potential secrets in compose files" >> $OUTPUT_FILE
        else
          echo "✅ No obvious secrets in compose files" >> $OUTPUT_FILE
        fi
        
        # Check for privileged containers
        if grep -r "privileged.*true" *.yml; then
          echo "❌ CRITICAL: Privileged containers found" >> $OUTPUT_FILE
        else
          echo "✅ No privileged containers" >> $OUTPUT_FILE
        fi
        
        # Check for host network mode
        if grep -r "network_mode.*host" *.yml; then
          echo "⚠️  WARNING: Host network mode used" >> $OUTPUT_FILE
        else
          echo "✅ No host network mode" >> $OUTPUT_FILE
        fi
        
        # Check for volume mounts
        if grep -r "/var/run/docker.sock" *.yml; then
          echo "❌ CRITICAL: Docker socket mounted" >> $OUTPUT_FILE
        else
          echo "✅ Docker socket not mounted" >> $OUTPUT_FILE
        fi
        EOF
        
        chmod +x check-compose-security.sh
        ./check-compose-security.sh
        
    - name: Scan Kubernetes configurations (if present)
      run: |
        if find . -name "*.yaml" -o -name "*.yml" | xargs grep -l "apiVersion.*v1" > /dev/null 2>&1; then
          echo "🔍 Scanning Kubernetes configurations..."
          
          find . -name "*.yaml" -o -name "*.yml" | while read file; do
            if grep -q "apiVersion.*v1" "$file"; then
              echo "Scanning K8s file: $file"
              kube-score score "$file" > "infrastructure-security/k8s-$(basename $file)-score.txt" || true
            fi
          done
        else
          echo "No Kubernetes configurations found"
        fi
        
    - name: Upload infrastructure security results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: infrastructure-security-results
        path: infrastructure-security/

  # ================================
  # Security Report Generation
  # ================================
  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [dependency-security-scan, static-code-analysis, container-security-scan, infrastructure-security-scan]
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download all security artifacts
      uses: actions/download-artifact@v3
      with:
        path: ./security-artifacts
        
    - name: Generate comprehensive security report
      run: |
        mkdir -p security-report
        
        cat > security-report/comprehensive-security-report.md << 'EOF'
        # 🛡️ Comprehensive Security Report
        
        **Generated:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
        **Repository:** ${{ github.repository }}
        **Commit:** ${{ github.sha }}
        **Branch:** ${{ github.ref_name }}
        
        ## 📊 Security Scan Summary
        
        | Scan Type | AI Chat Service | Document Search Service | Status |
        |-----------|----------------|-------------------------|--------|
        | Dependency Scan | ${{ needs.dependency-security-scan.result }} | ${{ needs.dependency-security-scan.result }} | ${{ needs.dependency-security-scan.result == 'success' && '✅' || '❌' }} |
        | Static Code Analysis | ${{ needs.static-code-analysis.result }} | ${{ needs.static-code-analysis.result }} | ${{ needs.static-code-analysis.result == 'success' && '✅' || '❌' }} |
        | Container Security | ${{ needs.container-security-scan.result }} | ${{ needs.container-security-scan.result }} | ${{ needs.container-security-scan.result == 'success' && '✅' || '❌' }} |
        | Infrastructure Scan | N/A | N/A | ${{ needs.infrastructure-security-scan.result == 'success' && '✅' || '❌' }} |
        
        ## 🔍 Detailed Findings
        
        ### Dependency Vulnerabilities
        - **Tool Used:** Safety, pip-audit
        - **Scope:** Python package dependencies
        - **Results:** Check individual service artifacts for detailed findings
        
        ### Static Code Analysis
        - **Tools Used:** Bandit, Semgrep
        - **Scope:** Python source code security patterns
        - **Results:** Check SARIF reports uploaded to GitHub Security tab
        
        ### Container Security
        - **Tools Used:** Trivy, Docker Scout
        - **Scope:** Container image vulnerabilities and misconfigurations
        - **Results:** Check container security artifacts
        
        ### Infrastructure Security
        - **Tools Used:** Checkov, kube-score
        - **Scope:** Docker Compose and Kubernetes configurations
        - **Results:** Check infrastructure security artifacts
        
        ## 🎯 Recommendations
        
        ### High Priority
        1. Review and address any CRITICAL vulnerabilities found in container scans
        2. Update dependencies with known security vulnerabilities
        3. Fix any hardcoded secrets or credentials in source code
        
        ### Medium Priority
        1. Review Dockerfile security best practices compliance
        2. Implement proper secret management for production
        3. Enable container security scanning in CI/CD pipeline
        
        ### Low Priority
        1. Consider implementing runtime security monitoring
        2. Regular security training for development team
        3. Automated dependency updates with security patches
        
        ## 📋 Action Items
        
        - [ ] Review all CRITICAL and HIGH severity findings
        - [ ] Update vulnerable dependencies
        - [ ] Fix container security misconfigurations
        - [ ] Implement proper secret management
        - [ ] Set up automated security monitoring
        
        ## 📈 Security Metrics
        
        - **Scan Coverage:** 4/4 security scan types completed
        - **Automation Level:** Fully automated in CI/CD
        - **Reporting:** Integrated with GitHub Security tab
        - **Notification:** Configured for security alerts
        
        ---
        *This report was automatically generated by the Security Scanning Pipeline*
        EOF
        
        # Replace placeholders with actual values
        sed -i "s/\$(date -u +\"%Y-%m-%d %H:%M:%S UTC\")/$(date -u +"%Y-%m-%d %H:%M:%S UTC")/g" security-report/comprehensive-security-report.md
        
    - name: Upload comprehensive security report
      uses: actions/upload-artifact@v3
      with:
        name: comprehensive-security-report
        path: security-report/
        
    - name: Comment security report on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('security-report/comprehensive-security-report.md', 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 🛡️ Security Scan Results\n\n${report}`
          });
          
    - name: Security scan status check
      run: |
        echo "🛡️ Security Scan Pipeline Completed"
        echo "===================================="
        echo ""
        echo "Scan Results:"
        echo "- Dependency Security: ${{ needs.dependency-security-scan.result }}"
        echo "- Static Code Analysis: ${{ needs.static-code-analysis.result }}"
        echo "- Container Security: ${{ needs.container-security-scan.result }}"
        echo "- Infrastructure Security: ${{ needs.infrastructure-security-scan.result }}"
        echo ""
        
        # Check if any critical scans failed
        if [[ "${{ needs.dependency-security-scan.result }}" == "failure" || 
              "${{ needs.static-code-analysis.result }}" == "failure" || 
              "${{ needs.container-security-scan.result }}" == "failure" ]]; then
          echo "⚠️ Some security scans encountered issues"
          echo "Please review the detailed reports and address any critical findings"
        else
          echo "✅ All security scans completed successfully"
        fi