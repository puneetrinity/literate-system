name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run nightly E2E tests
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Specific test suite to run (leave empty for all)'
        required: false
        default: ''
      environment:
        description: 'Environment to test against'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
          - local

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  E2E_TESTS_ENABLED: true
  ENVIRONMENT: test
  DEBUG: false

jobs:
  # Environment Setup and Validation
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      environment-ready: ${{ steps.validate.outputs.ready }}
      test-matrix: ${{ steps.matrix.outputs.matrix }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio httpx docker pyyaml psutil
        
    - name: Validate environment
      id: validate
      run: |
        python -c "
        import docker, yaml, json
        try:
            client = docker.from_env()
            client.ping()
            print('Docker available')
            print('::set-output name=ready::true')
        except Exception as e:
            print(f'Docker not available: {e}')
            print('::set-output name=ready::false')
        "
        
    - name: Generate test matrix
      id: matrix
      run: |
        python -c "
        import json
        
        # Define test matrix based on input or default
        if '${{ github.event.inputs.test_suite }}':
            suites = ['${{ github.event.inputs.test_suite }}']
        else:
            suites = [
                'health-checks',
                'integration-basic', 
                'data-flow',
                'api-workflows',
                'performance'
            ]
            
        matrix = {
            'include': [
                {
                    'suite': suite,
                    'timeout': 30 if 'performance' not in suite else 60,
                    'parallel': suite not in ['performance', 'health-checks']
                }
                for suite in suites
            ]
        }
        
        print(f'Generated matrix: {json.dumps(matrix)}')
        print(f'::set-output name=matrix::{json.dumps(matrix)}')
        "

  # Health Checks and Infrastructure Validation
  health-checks:
    needs: setup
    if: needs.setup.outputs.environment-ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ai-chat-service/requirements.txt
        pip install -r document-search-service/requirements.txt
        pip install pytest pytest-asyncio httpx docker pyyaml psutil redis
        
    - name: Start test services
      run: |
        # Build and start services for testing
        cd ai-chat-service && python -m pytest tests/test_health.py -v --tb=short
        cd ../document-search-service && python -m pytest tests/test_api.py -v --tb=short
        
    - name: Run health check tests
      run: |
        cd tests/e2e
        python -m pytest test_deployment_validation_e2e.py::TestDeploymentValidationE2E::test_docker_compose_deployment_validation -v --tb=short
        
    - name: Upload health check results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: health-check-results
        path: test-results/
        retention-days: 7

  # Core Integration Tests
  integration-tests:
    needs: [setup, health-checks]
    if: needs.setup.outputs.environment-ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.test-matrix) }}
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-e2e-${{ hashFiles('**/requirements*.txt') }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ai-chat-service/requirements.txt
        pip install -r document-search-service/requirements.txt
        pip install pytest pytest-asyncio httpx docker pyyaml psutil redis aiofiles
        
    - name: Configure test environment
      run: |
        export REDIS_URL=redis://localhost:6380
        export DOCUMENT_SEARCH_URL=http://localhost:8002
        export AI_CHAT_URL=http://localhost:8004
        export TEST_ENVIRONMENT=ci
        
    - name: Run integration tests
      run: |
        cd tests/e2e
        case "${{ matrix.suite }}" in
          "integration-basic")
            python -m pytest test_cross_service_integration.py -v --tb=short --timeout=${{ matrix.timeout }}
            ;;
          "data-flow")
            python -m pytest test_data_flow_e2e.py -v --tb=short --timeout=${{ matrix.timeout }}
            ;;
          "api-workflows")
            python -m pytest test_api_workflow_e2e.py -v --tb=short --timeout=${{ matrix.timeout }}
            ;;
          "performance")
            python -m pytest test_performance_e2e.py -v --tb=short --timeout=${{ matrix.timeout }}
            ;;
          *)
            echo "Unknown test suite: ${{ matrix.suite }}"
            exit 1
            ;;
        esac
        
    - name: Generate test report
      if: always()
      run: |
        mkdir -p test-results
        python -c "
        import json, time
        
        report = {
            'suite': '${{ matrix.suite }}',
            'status': 'completed',
            'timestamp': time.time(),
            'environment': 'ci',
            'runner': '${{ runner.os }}'
        }
        
        with open('test-results/${{ matrix.suite }}-report.json', 'w') as f:
            json.dump(report, f, indent=2)
        "
        
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.suite }}-results
        path: test-results/
        retention-days: 7

  # Comprehensive E2E Test Orchestration
  e2e-orchestration:
    needs: [setup, health-checks]
    if: needs.setup.outputs.environment-ready == 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ai-chat-service/requirements.txt
        pip install -r document-search-service/requirements.txt  
        pip install pytest pytest-asyncio httpx docker pyyaml psutil redis aiofiles
        
    - name: Configure orchestration environment
      run: |
        export REDIS_URL=redis://localhost:6380
        export DOCUMENT_SEARCH_URL=http://localhost:8002
        export AI_CHAT_URL=http://localhost:8004
        export TEST_ENVIRONMENT=orchestration
        export E2E_FULL_SUITE=true
        
    - name: Run E2E orchestrator
      run: |
        cd tests/e2e
        python -m pytest test_orchestrator.py::TestE2EOrchestrator::test_sample_execution -v --tb=short
        
    - name: Generate comprehensive report
      if: always()
      run: |
        mkdir -p reports
        python -c "
        import json, time, os
        
        # Generate comprehensive execution report
        report = {
            'execution_type': 'full_orchestration',
            'timestamp': time.time(),
            'environment': 'ci',
            'trigger': '${{ github.event_name }}',
            'branch': '${{ github.ref_name }}',
            'commit': '${{ github.sha }}',
            'runner': '${{ runner.os }}',
            'status': 'completed'
        }
        
        with open('reports/e2e-orchestration-report.json', 'w') as f:
            json.dump(report, f, indent=2)
        "
        
    - name: Upload comprehensive results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: e2e-orchestration-results
        path: reports/
        retention-days: 30

  # Results Aggregation and Notification
  results:
    needs: [health-checks, integration-tests, e2e-orchestration]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download all test results
      uses: actions/download-artifact@v3
      with:
        path: all-results/
        
    - name: Aggregate results
      run: |
        python -c "
        import json, os, glob
        from pathlib import Path
        
        results_dir = Path('all-results')
        all_results = []
        
        # Collect all test results
        for result_file in results_dir.rglob('*.json'):
            try:
                with open(result_file) as f:
                    data = json.load(f)
                    all_results.append(data)
            except Exception as e:
                print(f'Error reading {result_file}: {e}')
                
        # Generate summary
        summary = {
            'total_suites': len(all_results),
            'successful_suites': len([r for r in all_results if r.get('status') == 'completed']),
            'timestamp': max([r.get('timestamp', 0) for r in all_results] or [0]),
            'environment': 'ci',
            'workflow_run': '${{ github.run_id }}',
            'results': all_results
        }
        
        print(f'Test Summary:')
        print(f'  Total Suites: {summary[\"total_suites\"]}')
        print(f'  Successful: {summary[\"successful_suites\"]}')
        print(f'  Success Rate: {summary[\"successful_suites\"]/summary[\"total_suites\"]*100:.1f}%' if summary['total_suites'] > 0 else '  Success Rate: N/A')
        
        # Save aggregated results
        with open('test-summary.json', 'w') as f:
            json.dump(summary, f, indent=2)
        "
        
    - name: Upload final summary
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-summary
        path: test-summary.json
        retention-days: 90
        
    - name: Comment PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          
          try {
            const summary = JSON.parse(fs.readFileSync('test-summary.json', 'utf8'));
            const successRate = summary.total_suites > 0 ? 
              (summary.successful_suites / summary.total_suites * 100).toFixed(1) : 'N/A';
            
            const comment = `## 🧪 E2E Test Results
            
            | Metric | Value |
            |--------|-------|
            | Total Test Suites | ${summary.total_suites} |
            | Successful Suites | ${summary.successful_suites} |
            | Success Rate | ${successRate}% |
            | Workflow Run | [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
            
            ${summary.successful_suites === summary.total_suites ? '✅ All E2E tests passed!' : '⚠️ Some E2E tests failed. Please check the detailed results.'}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          } catch (error) {
            console.log('Error posting comment:', error);
          }

    - name: Set job status
      if: always()
      run: |
        python -c "
        import json, sys
        
        try:
            with open('test-summary.json') as f:
                summary = json.load(f)
                
            if summary['successful_suites'] < summary['total_suites']:
                print('Some E2E tests failed')
                sys.exit(1)
            else:
                print('All E2E tests passed')
                sys.exit(0)
        except Exception as e:
            print(f'Error determining job status: {e}')
            sys.exit(1)
        "