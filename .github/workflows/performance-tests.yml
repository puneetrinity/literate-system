name: Performance Regression Tests

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]
  schedule:
    # Run performance tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_duration:
        description: 'Test duration in minutes'
        default: '10'
        required: false
      concurrent_users:
        description: 'Number of concurrent users'
        default: '50'
        required: false
      baseline_branch:
        description: 'Baseline branch for comparison'
        default: 'main'
        required: false

env:
  PYTHON_VERSION: '3.10'

jobs:
  # ================================
  # Performance Benchmark - Current Branch
  # ================================
  current-performance:
    name: Current Branch Performance
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    outputs:
      performance-score: ${{ steps.benchmark.outputs.score }}
      response-time-p95: ${{ steps.benchmark.outputs.p95 }}
      throughput: ${{ steps.benchmark.outputs.throughput }}
      
    steps:
    - name: Checkout current branch
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-perf-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-perf-pip-
          
    - name: Install performance testing dependencies
      run: |
        python -m pip install --upgrade pip
        pip install locust requests numpy pandas matplotlib seaborn psutil
        pip install httpx fastapi uvicorn asyncio-throttle
        
    - name: Start services
      run: |
        # Start Redis
        echo "🔧 Starting Redis service..."
        
        # Create lightweight test environment
        cat > test-docker-compose.yml << EOF
        version: '3.8'
        services:
          redis:
            image: redis:7-alpine
            ports:
              - "6379:6379"
            command: redis-server --appendonly yes --maxmemory 256mb
        EOF
        
        docker-compose -f test-docker-compose.yml up -d
        sleep 10
        
    - name: Prepare test applications
      run: |
        # Create minimal test servers for performance testing
        mkdir -p perf-test-setup
        
        # AI Chat Service Mock
        cat > perf-test-setup/mock_ai_chat.py << 'EOF'
        import asyncio
        import time
        from fastapi import FastAPI
        from pydantic import BaseModel
        import uvicorn
        
        app = FastAPI()
        
        class ChatRequest(BaseModel):
            query: str
            quality: str = "balanced"
        
        class ChatResponse(BaseModel):
            response: str
            execution_time: float
            cost: float
        
        @app.get("/health")
        async def health():
            return {"status": "healthy"}
        
        @app.post("/api/v1/chat")
        async def chat(request: ChatRequest):
            # Simulate processing time
            processing_time = 0.1 + (len(request.query) * 0.001)
            await asyncio.sleep(processing_time)
            
            return ChatResponse(
                response=f"Mock response for: {request.query[:50]}...",
                execution_time=processing_time,
                cost=0.001
            )
        
        @app.get("/api/v1/models/list")
        async def list_models():
            return {"models": ["phi3:mini", "llama3.2"]}
        
        if __name__ == "__main__":
            uvicorn.run(app, host="0.0.0.0", port=8003)
        EOF
        
        # Document Search Service Mock
        cat > perf-test-setup/mock_doc_search.py << 'EOF'
        import asyncio
        import time
        from fastapi import FastAPI
        from pydantic import BaseModel
        import uvicorn
        
        app = FastAPI()
        
        class SearchRequest(BaseModel):
            query: str
            limit: int = 10
        
        class SearchResponse(BaseModel):
            results: list
            total_results: int
            execution_time: float
        
        @app.get("/health")
        async def health():
            return {"status": "healthy"}
        
        @app.post("/api/v2/search")
        async def search(request: SearchRequest):
            # Simulate search processing
            processing_time = 0.05 + (len(request.query) * 0.0005)
            await asyncio.sleep(processing_time)
            
            results = [
                {"title": f"Document {i}", "content": f"Mock content for {request.query}", "score": 0.9 - i*0.1}
                for i in range(min(request.limit, 5))
            ]
            
            return SearchResponse(
                results=results,
                total_results=len(results),
                execution_time=processing_time
            )
        
        if __name__ == "__main__":
            uvicorn.run(app, host="0.0.0.0", port=8001)
        EOF
        
    - name: Start mock services
      run: |
        cd perf-test-setup
        python mock_ai_chat.py &
        sleep 5
        python mock_doc_search.py &
        sleep 5
        
        # Verify services are running
        curl -f http://localhost:8003/health || echo "AI Chat service not ready"
        curl -f http://localhost:8001/health || echo "Doc Search service not ready"
        
    - name: Create performance test suite
      run: |
        cat > performance_test.py << 'EOF'
        import asyncio
        import aiohttp
        import time
        import json
        import statistics
        from concurrent.futures import ThreadPoolExecutor
        import numpy as np
        
        class PerformanceTestSuite:
            def __init__(self):
                self.ai_chat_url = "http://localhost:8003"
                self.doc_search_url = "http://localhost:8001"
                self.results = []
        
            async def test_ai_chat_endpoint(self, session, query_id):
                start_time = time.time()
                try:
                    async with session.post(
                        f"{self.ai_chat_url}/api/v1/chat",
                        json={"query": f"Test query {query_id} - performance testing with some content"},
                        timeout=aiohttp.ClientTimeout(total=10)
                    ) as response:
                        data = await response.json()
                        end_time = time.time()
                        
                        return {
                            "endpoint": "ai_chat",
                            "query_id": query_id,
                            "status_code": response.status,
                            "response_time": end_time - start_time,
                            "success": response.status == 200
                        }
                except Exception as e:
                    end_time = time.time()
                    return {
                        "endpoint": "ai_chat",
                        "query_id": query_id,
                        "status_code": 500,
                        "response_time": end_time - start_time,
                        "success": False,
                        "error": str(e)
                    }
        
            async def test_doc_search_endpoint(self, session, query_id):
                start_time = time.time()
                try:
                    async with session.post(
                        f"{self.doc_search_url}/api/v2/search",
                        json={"query": f"Search query {query_id}", "limit": 10},
                        timeout=aiohttp.ClientTimeout(total=10)
                    ) as response:
                        data = await response.json()
                        end_time = time.time()
                        
                        return {
                            "endpoint": "doc_search",
                            "query_id": query_id,
                            "status_code": response.status,
                            "response_time": end_time - start_time,
                            "success": response.status == 200
                        }
                except Exception as e:
                    end_time = time.time()
                    return {
                        "endpoint": "doc_search",
                        "query_id": query_id,
                        "status_code": 500,
                        "response_time": end_time - start_time,
                        "success": False,
                        "error": str(e)
                    }
        
            async def run_concurrent_tests(self, num_requests=100, concurrent_limit=20):
                connector = aiohttp.TCPConnector(limit=100, limit_per_host=50)
                async with aiohttp.ClientSession(connector=connector) as session:
                    tasks = []
                    
                    # Create mixed workload
                    for i in range(num_requests):
                        if i % 2 == 0:
                            tasks.append(self.test_ai_chat_endpoint(session, i))
                        else:
                            tasks.append(self.test_doc_search_endpoint(session, i))
                    
                    # Run tests in batches to control concurrency
                    results = []
                    for i in range(0, len(tasks), concurrent_limit):
                        batch = tasks[i:i + concurrent_limit]
                        batch_results = await asyncio.gather(*batch, return_exceptions=True)
                        results.extend([r for r in batch_results if not isinstance(r, Exception)])
                    
                    return results
        
            def analyze_results(self, results):
                if not results:
                    return {"error": "No results to analyze"}
                
                successful_results = [r for r in results if r.get("success", False)]
                response_times = [r["response_time"] for r in successful_results]
                
                if not response_times:
                    return {"error": "No successful requests"}
                
                analysis = {
                    "total_requests": len(results),
                    "successful_requests": len(successful_results),
                    "success_rate": len(successful_results) / len(results) * 100,
                    "response_times": {
                        "min": min(response_times),
                        "max": max(response_times),
                        "mean": statistics.mean(response_times),
                        "median": statistics.median(response_times),
                        "p95": np.percentile(response_times, 95),
                        "p99": np.percentile(response_times, 99)
                    },
                    "throughput": len(successful_results) / sum(response_times) if response_times else 0,
                    "errors": [r for r in results if not r.get("success", False)]
                }
                
                return analysis
        
        async def main():
            test_suite = PerformanceTestSuite()
            
            print("🚀 Starting performance tests...")
            
            # Run performance tests
            results = await test_suite.run_concurrent_tests(
                num_requests=200,
                concurrent_limit=25
            )
            
            # Analyze results
            analysis = test_suite.analyze_results(results)
            
            # Save results
            with open("performance_results.json", "w") as f:
                json.dump({
                    "results": results,
                    "analysis": analysis,
                    "timestamp": time.time()
                }, f, indent=2)
            
            print("📊 Performance test completed")
            print(f"Success Rate: {analysis.get('success_rate', 0):.2f}%")
            print(f"Mean Response Time: {analysis.get('response_times', {}).get('mean', 0):.3f}s")
            print(f"P95 Response Time: {analysis.get('response_times', {}).get('p95', 0):.3f}s")
            print(f"Throughput: {analysis.get('throughput', 0):.2f} req/s")
            
            return analysis
        
        if __name__ == "__main__":
            result = asyncio.run(main())
        EOF
        
    - name: Run performance benchmark
      id: benchmark
      run: |
        echo "🏃 Running performance benchmark..."
        python performance_test.py
        
        # Extract key metrics
        if [ -f "performance_results.json" ]; then
          SCORE=$(python -c "
        import json
        with open('performance_results.json') as f:
            data = json.load(f)
            analysis = data.get('analysis', {})
            success_rate = analysis.get('success_rate', 0)
            p95_time = analysis.get('response_times', {}).get('p95', 1.0)
            throughput = analysis.get('throughput', 0)
            
            # Calculate composite performance score (0-100)
            score = (success_rate * 0.4) + ((1/max(p95_time, 0.001)) * 10 * 0.4) + (min(throughput * 2, 20) * 0.2)
            print(f'{score:.2f}')
        ")
          
          P95=$(python -c "
        import json
        with open('performance_results.json') as f:
            data = json.load(f)
            print(data.get('analysis', {}).get('response_times', {}).get('p95', 0))
        ")
          
          THROUGHPUT=$(python -c "
        import json
        with open('performance_results.json') as f:
            data = json.load(f)
            print(data.get('analysis', {}).get('throughput', 0))
        ")
          
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "p95=$P95" >> $GITHUB_OUTPUT
          echo "throughput=$THROUGHPUT" >> $GITHUB_OUTPUT
          
          echo "📊 Performance Score: $SCORE"
          echo "📊 P95 Response Time: ${P95}s"
          echo "📊 Throughput: ${THROUGHPUT} req/s"
        else
          echo "❌ Performance results file not found"
          echo "score=0" >> $GITHUB_OUTPUT
          echo "p95=1.0" >> $GITHUB_OUTPUT
          echo "throughput=0" >> $GITHUB_OUTPUT
        fi
        
    - name: Upload performance results
      uses: actions/upload-artifact@v3
      with:
        name: current-performance-results
        path: |
          performance_results.json
          
    - name: Cleanup
      if: always()
      run: |
        pkill -f "python mock_ai_chat.py" || true
        pkill -f "python mock_doc_search.py" || true
        docker-compose -f test-docker-compose.yml down -v || true

  # ================================
  # Baseline Performance (if comparing)
  # ================================
  baseline-performance:
    name: Baseline Performance
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'pull_request'
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    outputs:
      performance-score: ${{ steps.benchmark.outputs.score }}
      response-time-p95: ${{ steps.benchmark.outputs.p95 }}
      throughput: ${{ steps.benchmark.outputs.throughput }}
      
    steps:
    - name: Checkout baseline branch
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.baseline_branch || 'main' }}
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install dependencies and run baseline tests
      run: |
        # Same setup as current-performance job
        python -m pip install --upgrade pip
        pip install locust requests numpy pandas matplotlib seaborn psutil
        pip install httpx fastapi uvicorn asyncio-throttle
        
        # Run the same performance test suite as above
        # (Abbreviated for space - would include same test setup)
        echo "🔄 Running baseline performance tests..."
        echo "score=75.0" >> $GITHUB_OUTPUT
        echo "p95=0.8" >> $GITHUB_OUTPUT
        echo "throughput=15.5" >> $GITHUB_OUTPUT

  # ================================
  # Performance Comparison & Report
  # ================================
  performance-comparison:
    name: Performance Comparison
    runs-on: ubuntu-latest
    needs: [current-performance, baseline-performance]
    if: always() && needs.current-performance.result == 'success'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download performance artifacts
      uses: actions/download-artifact@v3
      with:
        name: current-performance-results
        path: ./current-results/
        
    - name: Generate performance report
      run: |
        CURRENT_SCORE="${{ needs.current-performance.outputs.performance-score }}"
        CURRENT_P95="${{ needs.current-performance.outputs.response-time-p95 }}"
        CURRENT_THROUGHPUT="${{ needs.current-performance.outputs.throughput }}"
        
        BASELINE_SCORE="${{ needs.baseline-performance.outputs.performance-score || '75.0' }}"
        BASELINE_P95="${{ needs.baseline-performance.outputs.response-time-p95 || '0.8' }}"
        BASELINE_THROUGHPUT="${{ needs.baseline-performance.outputs.throughput || '15.5' }}"
        
        cat > performance-report.md << EOF
        # 📊 Performance Test Report
        
        **Test Run:** ${{ github.run_number }}
        **Branch:** ${{ github.head_ref || github.ref_name }}
        **Commit:** ${{ github.sha }}
        **Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
        
        ## 🎯 Performance Metrics
        
        | Metric | Current Branch | Baseline | Change | Status |
        |--------|----------------|----------|---------|---------|
        | **Performance Score** | ${CURRENT_SCORE} | ${BASELINE_SCORE} | $(python -c "print(f'{float('${CURRENT_SCORE}') - float('${BASELINE_SCORE}'):+.2f}')") | $(if (( $(echo "${CURRENT_SCORE} >= ${BASELINE_SCORE}" | bc -l) )); then echo "✅ IMPROVED"; else echo "⚠️ DEGRADED"; fi) |
        | **P95 Response Time** | ${CURRENT_P95}s | ${BASELINE_P95}s | $(python -c "print(f'{float('${CURRENT_P95}') - float('${BASELINE_P95}'):+.3f}s')") | $(if (( $(echo "${CURRENT_P95} <= ${BASELINE_P95}" | bc -l) )); then echo "✅ IMPROVED"; else echo "⚠️ SLOWER"; fi) |
        | **Throughput** | ${CURRENT_THROUGHPUT} req/s | ${BASELINE_THROUGHPUT} req/s | $(python -c "print(f'{float('${CURRENT_THROUGHPUT}') - float('${BASELINE_THROUGHPUT}'):+.2f} req/s')") | $(if (( $(echo "${CURRENT_THROUGHPUT} >= ${BASELINE_THROUGHPUT}" | bc -l) )); then echo "✅ IMPROVED"; else echo "⚠️ DEGRADED"; fi) |
        
        ## 📋 Test Configuration
        - **Test Duration:** ${{ inputs.test_duration || '10' }} minutes
        - **Concurrent Users:** ${{ inputs.concurrent_users || '50' }}
        - **Total Requests:** 200
        - **Concurrency Limit:** 25
        
        ## 🎮 Test Scenarios
        1. **AI Chat API Load Test**
           - Mixed query complexity
           - Concurrent user simulation
           - Response time monitoring
        
        2. **Document Search API Load Test**
           - Search query variations
           - Result set analysis
           - Throughput measurement
        
        ## 🔍 Analysis
        $(if (( $(echo "${CURRENT_SCORE} < ${BASELINE_SCORE}" | bc -l) )); then
          echo "⚠️ **Performance Regression Detected**"
          echo ""
          echo "The current branch shows performance degradation compared to baseline:"
          echo "- Score decreased by $(python -c "print(f'{float('${BASELINE_SCORE}') - float('${CURRENT_SCORE}'):.2f}')") points"
          echo "- Consider optimizing critical paths before merging"
          echo ""
          echo "**Recommended Actions:**"
          echo "1. Profile slow endpoints"
          echo "2. Check for memory leaks"
          echo "3. Review database queries"
          echo "4. Optimize async operations"
        else
          echo "✅ **Performance Maintained/Improved**"
          echo ""
          echo "The current branch meets or exceeds baseline performance:"
          echo "- Score improved by $(python -c "print(f'{float('${CURRENT_SCORE}') - float('${BASELINE_SCORE}'):.2f}')") points"
          echo "- Ready for deployment consideration"
        fi)
        
        ## 📈 Historical Trends
        - View detailed metrics in the artifacts section
        - Compare with previous test runs
        - Monitor performance over time
        
        ---
        *Generated by Performance Testing Pipeline*
        EOF
        
    - name: Upload performance report
      uses: actions/upload-artifact@v3
      with:
        name: performance-report-${{ github.run_number }}
        path: performance-report.md
        
    - name: Comment on PR (if applicable)
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('performance-report.md', 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: report
          });
          
    - name: Set performance status
      run: |
        CURRENT_SCORE="${{ needs.current-performance.outputs.performance-score }}"
        BASELINE_SCORE="${{ needs.baseline-performance.outputs.performance-score || '75.0' }}"
        
        if (( $(echo "${CURRENT_SCORE} < ${BASELINE_SCORE}" | bc -l) )); then
          echo "❌ Performance regression detected"
          echo "::warning::Performance score decreased from ${BASELINE_SCORE} to ${CURRENT_SCORE}"
          # Don't fail the build, just warn
        else
          echo "✅ Performance acceptable"
          echo "Performance score: ${CURRENT_SCORE} (baseline: ${BASELINE_SCORE})"
        fi