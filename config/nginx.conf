events {
    worker_connections 1024;
}

http {
    upstream ai-chat-service {
        server ai-chat:8003;
    }
    
    upstream document-search-service {
        server document-search:8001;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    
    # Main server block
    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # AI Chat Service Routes
        location /api/v1/chat/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://ai-chat-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for streaming
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Research and Deep Dive Routes
        location /api/v1/research/ {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://ai-chat-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Extended timeout for research
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # Document Search Routes
        location /api/v2/search/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://document-search-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health Check Routes
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location /health/chat {
            proxy_pass http://ai-chat-service/health;
        }

        location /health/search {
            proxy_pass http://document-search-service/health;
        }

        # API Documentation
        location /docs/chat {
            proxy_pass http://ai-chat-service/docs;
        }

        location /docs/search {
            proxy_pass http://document-search-service/docs;
        }

        # Static UI Files (if available)
        location /ui/ {
            alias /usr/share/nginx/html/;
            try_files $uri $uri/ =404;
        }

        # Default route - API documentation
        location / {
            return 302 /docs/chat;
        }
    }
}